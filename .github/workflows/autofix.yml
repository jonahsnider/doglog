name: autofix.ci # needed to securely identify the workflow

on: [push, pull_request]

permissions:
  contents: read

jobs:
  autofix:
    name: Autofix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Fix Error Prone issues
        run: ./gradlew assemble
        env:
          ERRORPRONE_AUTOFIX: 1

      - name: Format library with Spotless
        run: ./gradlew spotlessApply

      - name: Format test project with Spotless
        run: ./gradlew spotlessApply
        working-directory: test-project

      - name: Setup aube
        uses: endevco/aube-action@v1
        with:
          node-version: "auto"
          run-install: true

      - name: Format docs with Prettier
        run: aubr format:write
        working-directory: web

      - name: Run autofix.ci
        uses: autofix-ci/action@v1
        with:
          commit-message: "style: run autofix.ci"
