name: CI

on: [push, pull_request]

jobs:
  assemble:
    name: Assemble

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Assemble project
        run: ./gradlew assemble
  style:
    name: Check formatting

    runs-on: ubuntu-latest

    timeout-minutes: 10

    needs: [assemble]

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Check formatting
        run: ./gradlew spotlessCheck
  infer:
    name: Infer

    runs-on: ubuntu-latest

    timeout-minutes: 10

    needs: [assemble]

    env:
      INFER_VERSION: v1.3.0

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Infer
        id: cache-infer
        uses: actions/cache@v5
        with:
          path: /tmp/infer
          key: infer-linux-x86_64-${{ env.INFER_VERSION }}
      - name: Install Infer
        if: steps.cache-infer.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/infer
          curl -sL "https://github.com/facebook/infer/releases/download/${INFER_VERSION}/infer-linux-x86_64-${INFER_VERSION}.tar.xz" \
            | tar xJ -C /tmp/infer
      - name: Add Infer to PATH
        run: echo "/tmp/infer/infer-linux-x86_64-${INFER_VERSION}/bin" >> "$GITHUB_PATH"
      - name: Run Infer
        run: ./gradlew infer -PinferFailOnIssue

  assemble-test-project:
    name: Assemble test project

    runs-on: ubuntu-latest

    timeout-minutes: 10

    needs: [assemble]

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Assemble DogLog
        run: ./gradlew assemble
      - name: Assemble test project
        run: ./gradlew assemble
        working-directory: test-project
  style-test-project:
    name: Check test project formatting

    runs-on: ubuntu-latest

    timeout-minutes: 10

    needs: [assemble]

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Check formatting
        run: ./gradlew spotlessCheck
        working-directory: test-project
  javadoc:
    name: Publish Javadoc

    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    needs: [assemble]

    timeout-minutes: 10

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build
        run: ./gradlew build
      - name: Setup aube
        uses: endevco/aube-action@v1
        with:
          version: 1.18.0
          node-version: "auto"
          run-install: true
      - name: Publish Javadoc to Cloudflare Workers
        run: aube -F @doglog/lib exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  docs:
    name: Build docs

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v6
      - name: Setup aube
        uses: endevco/aube-action@v1
        with:
          version: 1.18.0
          node-version: "auto"
          run-install: true
      - name: Build docs
        run: aubr build
        working-directory: web
