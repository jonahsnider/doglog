on:
  push:
    branches:
      - release-please--branches--main

permissions:
  contents: write

name: Sync vendordep.json

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v6
      - name: Copy vendordep.json to web/public/
        run: cp vendordep.json web/public/vendordep.json
      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet web/public/vendordep.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/vendordep.json
          git commit -m "chore: sync vendordep.json to web/public/"
          git push
