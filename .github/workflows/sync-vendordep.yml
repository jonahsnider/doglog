on:
  push:
    branches:
      - release-please--branches--main

permissions:
  contents: write

name: Sync vendordep.json

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v6
      - name: Copy vendordep.json to web/public/
        run: cp vendordep.json web/public/vendordep.json
      - name: Enable Corepack
        # Required due to a limitation in setup-node https://github.com/actions/setup-node/issues/480#issuecomment-1820622085
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "yarn"
      - name: Install docs dependencies
        run: yarn install --immutable
      - name: Format copied vendordep
        run: yarn prettier --write public/vendordep.json
        working-directory: web
      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet web/public/vendordep.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/vendordep.json
          git commit -m "chore: sync vendordep.json to web/public/"
          git push
