plugins {
	// Apply the java-library plugin for API and implementation separation.
	id 'java-library'
	id "com.diffplug.spotless" version "8.7.0"
	id 'org.wpilib.WPILibRepositoriesPlugin' version '2027.0.0'
	id 'maven-publish'
	id "net.ltgt.errorprone" version "5.1.0"
	id "net.ltgt.nullaway" version "3.1.0"
}

base.archivesName = 'doglog'

tasks.withType(Javadoc) {
	options {
		docTitle = "DogLog Javadoc"
	}
}

nullaway {
	onlyNullMarked = true
}

tasks.withType(JavaCompile).configureEach {
	// Error Prone configs
	options.errorprone {
		disableWarningsInGeneratedCode = true
		disable("InlineMeSuggester", "ImmutableEnumChecker", "Var", "BooleanParameter", "Java8ApiChecker", "ImmutableMemberCollection")

		nullaway {
			error()
		}
	}

	options.release = 25

	// Set the ERRORPRONE_AUTOFIX environment variable to fix files in place
	if (System.getenv().containsKey("ERRORPRONE_AUTOFIX")) {
		options.errorprone.errorproneArgs.add "-XepPatchLocation:IN_PLACE"
	}
}

ext.wpilibVersion = "2027.+"

repositories {
	// Use Maven Central for resolving dependencies.
	mavenCentral()
}

if (project.hasProperty('releaseMode')) {
	wpilibRepositories.addAllReleaseRepositories(project)
} else {
	wpilibRepositories.addAllDevelopmentRepositories(project)
}
wpilibRepositories.use2027Repos()

dependencies {
	implementation "org.wpilib.ntcore:ntcore-java:$wpilibVersion"
	implementation "org.wpilib.wpilibj:wpilibj-java:$wpilibVersion"
	implementation "org.wpilib.wpiutil:wpiutil-java:$wpilibVersion"
	implementation "org.wpilib.wpiunits:wpiunits-java:$wpilibVersion"
	implementation "org.wpilib.hal:hal-java:$wpilibVersion"
	implementation "org.wpilib.datalog:datalog-java:$wpilibVersion"

	compileOnly "us.hebi.quickbuf:quickbuf-runtime:1.4"
	compileOnly "com.google.errorprone:error_prone_annotations:2.49.0"

	errorprone "com.google.errorprone:error_prone_core:2.49.0"
	errorprone "com.uber.nullaway:nullaway:0.13.6"
	errorprone "tech.picnic.error-prone-support:error-prone-contrib:0.29.0"
	errorprone "tech.picnic.error-prone-support:refaster-runner:0.29.0"

	testImplementation "org.assertj:assertj-core:3.27.7"

	api "org.jspecify:jspecify:1.0.0"
}

tasks.register('infer', Exec) {
	group = 'verification'
	description = 'Run Infer.'
	workingDir = rootDir

	def classesDir = layout.buildDirectory.dir('infer/classes').get().asFile

	doFirst {
		classesDir.mkdirs()
	}

	def inferCommand = ['infer', 'run']
	if (project.hasProperty('inferFailOnIssue')) {
		inferCommand.add('--fail-on-issue')
	}
	inferCommand.addAll([
		'--',
		'javac',
		'--release',
		'25',
		'-cp',
		sourceSets.main.compileClasspath.asPath,
		'-d',
		classesDir.absolutePath
	])
	inferCommand.addAll(sourceSets.main.allJava.files.collect { it.absolutePath })
	commandLine inferCommand
}

publishing {
	publications {
		maven(MavenPublication) {
			from components.java
			groupId = "com.github.jonahsnider"
			artifactId = "doglog"
		}
	}
}

java {
	withSourcesJar()
	withJavadocJar()

	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}
var javaVersion = "25"


javadoc {
	options {
		links "https://docs.oracle.com/en/java/javase/$javaVersion/docs/api/", 'https://github.wpilib.org/allwpilib/docs/release/java/', 'https://jspecify.dev/docs/api/'
	}
}

spotless {
	enforceCheck = false

	encoding = 'UTF-8'
	lineEndings = 'UNIX'

	java {
		eclipse().configFile('eclipse-formatter.properties').sortMembersEnabled(true).sortMembersVisibilityOrderEnabled(true)
		googleJavaFormat()
		licenseHeader ''

		targetExclude('src/main/java/frc/robot/generated/BuildConstants.java')
	}

	groovyGradle {
		greclipse()
	}

	json {
		target '**/*.json'
		simple().indentWithSpaces(2)

		targetExclude('package.json', 'infer-out/**', 'node_modules/**')
	}
}
